<section>
    <label class="customFile">
        Selecciona tu cometa o carga tu cometa
        <input type="file" (change)="onFileChange($event)" hidden />
    </label>
    <div>
        <form [formGroup]="formGroup" (ngSubmit)="saveMeme()">

            <div class="form-group">
                <h5 class="mb-3">Guardar Meme</h5>
                <!-- ID -->
                <label>Id:</label>
                <input type="text" formControlName="id" class="form-control mb-2" readonly />

                <!-- Title -->
                <label>Título:</label>
                <input type="text" formControlName="title" class="form-control mb-2" />

                <!-- Description -->
                <label>Descripción:</label>
                <input type="text" formControlName="description" class="form-control mb-2" />

                <!-- Image -->
                <label>Imagen:</label>


            </div>

            <button type="submit" class="btn btn-primary">Aceptar</button>
            <button type="button" class="btn btn-danger" (click)="cancel()">Cancelar</button>

        </form>
    </div>
</section>
